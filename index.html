// ─── STORAGE ──────────────────────────────────────────────────────────────────
const mem = {};
const store = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : mem[k] || null; } catch (e2) { return mem[k] || null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e3) {} mem[k] = v; },
};

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let _ctx = null;
const aud = () => { if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)(); if (_ctx.state === "suspended") _ctx.resume(); return _ctx; };
const playLog   = () => { try { const c=aud(),sr=c.sampleRate,dur=0.4,buf=c.createBuffer(1,sr*dur,sr),d=buf.getChannelData(0); for(let i=0;i<d.length;i++){const t=i/sr;d[i]=Math.sin(2*Math.PI*520*t*Math.exp(-t*8))*Math.exp(-t*6)*0.4;} const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.6,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);s.start(); } catch(e){} };
const playUndo  = () => { try { const c=aud(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(380,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.18);o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);o.start();o.stop(c.currentTime+0.25); } catch(e){} };
const playGoal  = () => { try { const c=aud();[440,554,659,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime+i*0.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);o.start(t);o.stop(t+0.3);}); } catch(e){} };

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
// Android kills SW timers after minutes. The only reliable approach:
// Store the fire timestamp in localStorage, check it on every app focus/visibility event.

const nOk  = () => "Notification" in window && Notification.permission === "granted";
const nReq = () => "Notification" in window ? Notification.requestPermission() : Promise.resolve("denied");

// Fire a notification via SW (works on Android, unlike new Notification())
const nSend = (title, body, tag="hm") => {
  if (!nOk()) return;
  try {
    const show = (reg) => reg.showNotification(title, {
      body, icon:"./icon-192.png", badge:"./icon-192.png",
      tag, renotify:true, vibrate:[200,100,200],
      actions:[{action:"open",title:"Log drink"}],
    });
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      // Use SW message to trigger showNotification
      navigator.serviceWorker.controller.postMessage({type:"SHOW_NOTIFICATION",title,body,tag});
    } else {
      navigator.serviceWorker.ready.then(show).catch(()=>{});
    }
  } catch(e) {}
};

// Store scheduled reminder time — survives page close, SW death, screen lock
const REMINDER_KEY = "hm_reminder_at";
const setStoredReminder = (fireAt) => {
  try { localStorage.setItem(REMINDER_KEY, String(fireAt)); } catch(e) {}
};
const getStoredReminder = () => {
  try { return parseInt(localStorage.getItem(REMINDER_KEY)||"0",10)||0; } catch(e) { return 0; }
};
const clearStoredReminder = () => {
  try { localStorage.removeItem(REMINDER_KEY); } catch(e) {}
};

// Check if a stored reminder is due right now — called on focus/visibility
const checkMissedReminder = () => {
  const fireAt = getStoredReminder();
  if (!fireAt) return false;
  if (Date.now() >= fireAt) {
    clearStoredReminder();
    nSend("Time to hydrate 💧", "Your scheduled interval has passed. Log your next drink.", "hm-reminder");
    return true;
  }
  return false;
};

const swCancelReminder = () => {
  clearStoredReminder();
  try {
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({type:"CANCEL_REMINDER"});
    }
  } catch(e) {}
};

function getStatus(eff, goal, hourlyMl) {
  const over = eff - goal;
  if (hourlyMl > 900) return { level:"danger",  title:"Rate exceeded",       msg:`${hourlyMl} ml in the past hour. Renal processing threshold is approximately 800–1000 ml/hr.` };
  if (over >= 1500)   return { level:"danger",  title:"Intake limit reached", msg:`${Math.round(over)} ml above goal. Excessive intake dilutes serum sodium. Discontinue.` };
  if (over >= 800)    return { level:"warning", title:"Overhydration risk",   msg:`${Math.round(over)} ml above goal. Wait until thirst signals resume.` };
  if (over >= 300)    return { level:"caution", title:"Slightly over goal",   msg:`${Math.round(over)} ml above your calculated target.` };
  if (eff >= goal)    return { level:"success", title:"Goal reached",         msg:"Daily target met. Continue drinking only when thirsty." };
  return null;
}

function computeGoal(u, wb = 0) {
  // Base: 35ml/kg for males, 31ml/kg for females (EFSA/NASEM gender difference)
  // Men avg 3.0L drinks/day, Women 2.2L — ratio ~0.89
  const isFemale = u.gender === "female";
  const baseRate = isFemale ? 31 : 35;
  const base = Math.round((u.weight || 70) * baseRate);

  // Activity — research shows exercise adds 500-1000ml/session (ACE guidelines)
  const act = u.activity === "high" ? 1000 : u.activity === "medium" ? 600 : 300;

  // Climate — hot climates significantly increase sweat loss
  const clim = u.climate === "hot" ? 700 : u.climate === "cold" ? 0 : 300;

  // Age adjustment — over 55 needs more due to reduced thirst sensation
  const ageBonus = (u.age || 25) >= 55 ? 300 : 0;

  // Medication
  const medBonus = u.medication ? 200 : 0;

  // Condition-specific bonuses
  const conds = u.conditions || [];
  let condBonus = 0;
  if (conds.includes("Pregnant"))      condBonus += 400;  // IOM +400ml for pregnancy
  if (conds.includes("Breastfeeding")) condBonus += 700;  // IOM +700ml for lactation
  if (conds.includes("Menstruation"))  condBonus += 200;  // fluid loss during period
  if (conds.includes("Diabetes"))      condBonus += 300;  // increased urinary loss
  if (conds.includes("Kidney Issues")) condBonus += 500;  // prevent stone formation

  // Gender minimum floor based on NASEM
  const raw = base + act + clim + ageBonus + medBonus + condBonus + wb;
  const floor = isFemale ? 2200 : 2800;
  return Math.max(raw, floor);
}
function calcBMI(w, h) {
  if (!h || h < 50) return null;
  return Math.round(w / Math.pow(h/100, 2) * 10) / 10;
}
function bmiLabel(bmi) {
  if (!bmi)      return { label:"No data",     note:"Enter height to calculate." };
  if (bmi < 18.5) return { label:"Underweight", note:"Adequate hydration supports metabolic regulation." };
  if (bmi < 25)   return { label:"Normal",      note:"Maintain current hydration discipline." };
  if (bmi < 30)   return { label:"Overweight",  note:"Pre-meal hydration may support weight regulation." };
  return              { label:"Obese",         note:"Prioritise water. Eliminate sugared beverages." };
}
function calcScore(last7ml, goal, streak, todayPct) {
  const c = last7ml.filter(m => m >= goal * 0.8).length / 7;
  const a = last7ml.reduce((s, v) => s + v, 0) / 7 / goal;
  return Math.min(Math.round(c * 40 + a * 30 + Math.min(streak/30,1)*15 + Math.min(todayPct/100,1)*15), 100);
}

// ─── GOAL REVEAL ─────────────────────────────────────────────────────────────
function GoalScreen({ onStart, ud, wb }) {
  const [show, setShow] = useState(false);
  useEffect(()=>{ setTimeout(()=>setShow(true),300); },[]);

  const isFemale = ud.gender === "female";
  const baseRate = isFemale ? 31 : 35;
  const base  = Math.round((ud.weight||70) * baseRate);
  const act   = ud.activity==="high"?1000:ud.activity==="medium"?600:300;
  const clim  = ud.climate==="hot"?700:ud.climate==="cold"?0:300;
  const ageB  = (ud.age||25) >= 55 ? 300 : 0;
  const med   = ud.medication ? 200 : 0;
  const conds = ud.conditions || [];
  let condB = 0;
  if (conds.includes("Pregnant"))      condB += 400;
  if (conds.includes("Breastfeeding")) condB += 700;
  if (conds.includes("Menstruation"))  condB += 200;
  if (conds.includes("Diabetes"))      condB += 300;
  if (conds.includes("Kidney Issues")) condB += 500;
  const raw  = base + act + clim + ageB + med + condB + (wb||0);
  const floor = isFemale ? 2200 : 2800;
  const goal = Math.max(raw, floor);

  const rows = [
    [`Body weight (×${baseRate}ml/kg)`, base],
    ["Activity", act],
    ["Climate", clim],
    ...(ageB   ? [["Age (55+)", ageB]] : []),
    ...(med    ? [["Medication", med]] : []),
    ...(condB  ? [["Health conditions", condB]] : []),
    ...(wb     ? [["Weather", wb]] : []),
    ...(goal > raw ? [["Minimum floor", goal - raw]] : []),
    ["Daily target", goal],
  ];

  return (
    React.createElement('div', { className: "screen", style: { background:T.bg, padding:"36px 24px" },}
      , React.createElement('div', { className: "label", style: { marginBottom:8 },}, "Your personalised target"  )
      , React.createElement('div', { style: { fontSize:11, color:T.boneDim, fontWeight:300, marginBottom:16 },}, "Based on NASEM & EFSA guidelines · "
               , isFemale?"Female":"Male", " formula"
      )
      , React.createElement('div', { style: { overflow:"hidden", marginBottom:8 },}
        , React.createElement('div', { className: "mono", style: { fontSize:56, fontWeight:700, color:T.bone, letterSpacing:"-0.04em", lineHeight:1, animation:show?"fadeUp 0.6s ease both":"none" },}
          , goal.toLocaleString()
          , React.createElement('span', { style: { fontSize:20, fontWeight:400, color:T.boneDim },}, " ml" )
        )
      )
      , React.createElement('div', { style: { fontSize:12, color:T.boneDim, fontWeight:300, marginBottom:36 },}, Math.round(goal/250), " standard glasses — "    , (goal/1000).toFixed(1), " litres daily"  )

      , React.createElement('div', { style: { width:"100%", height:1, background:T.border, marginBottom:24 },})
      , React.createElement('div', { className: "label", style: { marginBottom:14 },}, "How we calculated this"   )
      , rows.map(([label,val],i)=>(
        React.createElement('div', { key: i, style: { display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:`1px solid ${T.border}`, animation:`fadeUp 0.4s ease ${0.1+i*0.07}s both` },}
          , React.createElement('span', { style: { fontSize:13, color:T.boneDim, fontWeight:300 },}, label)
          , React.createElement('span', { className: "mono", style: { fontSize:13, fontWeight:700, color:i===rows.length-1?T.teal:T.bone },}, i===rows.length-1?`${val.toLocaleString()} ml`:val>0?`+${val} ml`:`${val} ml`)
        )
      ))

      , React.createElement('div', { style: { marginTop:32 },}
        , React.createElement('button', { className: "btn-solid", onClick: onStart,}, "Begin Tracking" )
      )
    )

// ─── SHARE CARD ───────────────────────────────────────────────────────────────
function ShareCard({ appState, goal, onClose }) {
  const canvasRef = useRef(null);
  const [generated, setGenerated] = useState(false);
  const [sharing, setSharing] = useState(false);

  const ud      = appState.userData;
  const streak  = appState.streak || {current:0,best:0};
  const xp      = appState.xp || 0;
  const badges  = appState.earnedBadges || [];
  const today   = todayKey();
  const todayMl = (appState.dailyLogs && appState.dailyLogs[today] && appState.dailyLogs[today].effIntake) || 0;
  const pct     = Math.min(Math.round((todayMl/goal)*100),100);
  const last7   = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-6+i); const k=d.toISOString().slice(0,10); return (appState.dailyLogs&&appState.dailyLogs[k]&&appState.dailyLogs[k].effIntake)||0; });
  const avg     = Math.round(last7.reduce((s,v)=>s+v,0)/7);
  const lvl     = xp<100?"Rookie":xp<250?"Warrior":xp<500?"Champion":"Master";

  useEffect(()=>{
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 1080, H = 1920;
    canvas.width = W; canvas.height = H;

    // ── Background ──
    ctx.fillStyle = '#080808';
    ctx.fillRect(0,0,W,H);

    // Subtle grid pattern
    ctx.strokeStyle = 'rgba(61,122,116,0.06)';
    ctx.lineWidth = 1;
    for(let x=0;x<W;x+=60){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for(let y=0;y<H;y+=60){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

    // Top teal accent bar
    const grad = ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#3D7A74');
    grad.addColorStop(1,'#2A5550');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,8);

    // ── App name ──
    ctx.fillStyle = '#E8E4DC';
    ctx.font = 'bold 52px sans-serif';
    ctx.fillText('Hydra', 80, 120);
    ctx.fillStyle = '#3D7A74';
    ctx.fillText('Mind', 80+ctx.measureText('Hydra').width, 120);

    ctx.fillStyle = '#9A9690';
    ctx.font = '32px sans-serif';
    ctx.fillText('Hydration Intelligence', 80, 168);

    // ── User name ──
    if (ud.name) {
      ctx.fillStyle = '#E8E4DC';
      ctx.font = 'bold 72px sans-serif';
      ctx.fillText(ud.name + "'s stats", 80, 300);
    } else {
      ctx.fillStyle = '#E8E4DC';
      ctx.font = 'bold 72px sans-serif';
      ctx.fillText('My hydration stats', 80, 300);
    }

    // ── Divider ──
    ctx.strokeStyle = 'rgba(232,228,220,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(80,340); ctx.lineTo(W-80,340); ctx.stroke();

    // ── Today's progress ring ──
    const cx=540, cy=600, radius=180;
    // Background ring
    ctx.strokeStyle = 'rgba(232,228,220,0.08)';
    ctx.lineWidth = 24;
    ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.stroke();
    // Progress arc
    const startAngle = -Math.PI/2;
    const endAngle = startAngle + (Math.PI*2*(pct/100));
    const arcGrad = ctx.createLinearGradient(cx-radius,cy,cx+radius,cy);
    arcGrad.addColorStop(0,'#3D7A74');
    arcGrad.addColorStop(1,'#5BA89F');
    ctx.strokeStyle = arcGrad;
    ctx.lineWidth = 24;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx,cy,radius,startAngle,endAngle); ctx.stroke();
    // Center text
    ctx.fillStyle = '#E8E4DC';
    ctx.font = 'bold 96px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(pct+'%', cx, cy+12);
    ctx.fillStyle = '#9A9690';
    ctx.font = '36px sans-serif';
    ctx.fillText('of daily goal', cx, cy+60);
    ctx.fillStyle = '#3D7A74';
    ctx.font = 'bold 44px sans-serif';
    ctx.fillText(todayMl.toLocaleString()+' ml', cx, cy+116);
    ctx.textAlign = 'left';

    // ── Stats grid ──
