let _ctx = null;
const aud = () => { if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)(); if (_ctx.state === "suspended") _ctx.resume(); return _ctx; };
const playLog   = () => { try { const c=aud(),sr=c.sampleRate,dur=0.4,buf=c.createBuffer(1,sr*dur,sr),d=buf.getChannelData(0); for(let i=0;i<d.length;i++){const t=i/sr;d[i]=Math.sin(2*Math.PI*520*t*Math.exp(-t*8))*Math.exp(-t*6)*0.4;} const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.6,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);s.start(); } catch(e){} };
const playUndo  = () => { try { const c=aud(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(380,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.18);o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);o.start();o.stop(c.currentTime+0.25); } catch(e){} };
const playGoal  = () => { try { const c=aud();[440,554,659,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime+i*0.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);o.start(t);o.stop(t+0.3);}); } catch(e){} };

function getStatus(eff, goal, hourlyMl) {
  const over = eff - goal;
  if (hourlyMl > 900) return { level:"danger",  title:"Rate exceeded",       msg:`${hourlyMl} ml in the past hour. Renal processing threshold is approximately 800–1000 ml/hr.` };
  if (over >= 1500)   return { level:"danger",  title:"Intake limit reached", msg:`${Math.round(over)} ml above goal. Excessive intake dilutes serum sodium. Discontinue.` };
  if (over >= 800)    return { level:"warning", title:"Overhydration risk",   msg:`${Math.round(over)} ml above goal. Wait until thirst signals resume.` };
  if (over >= 300)    return { level:"caution", title:"Slightly over goal",   msg:`${Math.round(over)} ml above your calculated target.` };
  if (eff >= goal)    return { level:"success", title:"Goal reached",         msg:"Daily target met. Continue drinking only when thirsty." };
  return null;
}

function computeGoal(u, wb = 0) {
  const base = Math.round((u.weight || 70) * 33);
  const act  = u.activity === "high" ? 600 : u.activity === "medium" ? 400 : 150;
  const clim = u.climate  === "hot"  ? 400 : u.climate  === "cold"   ? 0   : 200;
  return base + act + clim + (u.medication ? 200 : 0) + wb;
}
function calcBMI(w, h) {
  if (!h || h < 50) return null;
  return Math.round(w / Math.pow(h/100, 2) * 10) / 10;
}
function bmiLabel(bmi) {
  if (!bmi)      return { label:"No data",     note:"Enter height to calculate." };
  if (bmi < 18.5) return { label:"Underweight", note:"Adequate hydration supports metabolic regulation." };
  if (bmi < 25)   return { label:"Normal",      note:"Maintain current hydration discipline." };
  if (bmi < 30)   return { label:"Overweight",  note:"Pre-meal hydration may support weight regulation." };
  return              { label:"Obese",         note:"Prioritise water. Eliminate sugared beverages." };
}
function calcScore(last7ml, goal, streak, todayPct) {
  const c = last7ml.filter(m => m >= goal * 0.8).length / 7;
  const a = last7ml.reduce((s, v) => s + v, 0) / 7 / goal;
  return Math.min(Math.round(c * 40 + a * 30 + Math.min(streak/30,1)*15 + Math.min(todayPct/100,1)*15), 100);
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [app, setAppRaw] = useState(null);
  const [screen, setScreen] = useState("splash");
  const [tab, setTab]    = useState("home");
  const [toasts, setToasts] = useState([]);
  const [showInstall, setShowInstall] = useState(false);
  const [nextReminder, setNextReminder] = useState(null);
  const [weather, setWeather] = useState(null);
  const [weatherLoading, setWeatherLoading] = useState(false);
  const timerRef    = useRef(null);
  const goalMetRef  = useRef(false);
  const deferredPWA = useRef(null);  // stores beforeinstallprompt event

  // ── Capture PWA install prompt ──
  useEffect(()=>{
    const handler = e => { e.preventDefault(); deferredPWA.current = e; };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  },[]);

  // toast helper
  const toast = useCallback((title, msg, level="info", dur=5000) => {
    const id = Date.now();
    setToasts(p=>[...p.slice(-2),{id,title,msg,level}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)), dur);
  },[]);

  // ── init ──
  useEffect(()=>{
    let s=load(); if(!s)s=defaultState();
    const t=todayKey();
    if(!s.dailyLogs)s.dailyLogs={};
    if(!s.dailyLogs[t])s.dailyLogs[t]={rawIntake:0,effIntake:0,logs:[]};
    if(!s.streak)s.streak={current:0,best:0,lastDate:null};
    if(!s.earnedBadges)s.earnedBadges=[];
    if(s.xp===undefined)s.xp=0;
    if(!s.settings)s.settings=defaultState().settings;
    if(s.settings.sounds===undefined)s.settings.sounds=true;
    if(!s.userData.height)s.userData.height=170;
    setAppRaw(s);
    setScreen(s.onboarded?"main":"onboarding");
  },[]);

  // ── Weather — requests location permission explicitly ──
  const fetchWeather = useCallback(()=>{
    if(!navigator.geolocation){ toast("Location unavailable","Geolocation is not supported by your browser.","danger"); return; }
    setWeatherLoading(true);
    navigator.geolocation.getCurrentPosition(
      async({coords})=>{
        try{
          const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.latitude.toFixed(4)}&longitude=${coords.longitude.toFixed(4)}&current=temperature_2m,weathercode`);
          const j=await r.json();
          const temp=Math.round(j.current.temperature_2m), wc=j.current.weathercode;
          const bonus=temp>=38?600:temp>=32?400:temp>=26?200:temp>=18?0:-100;
          const condition=temp>=38?"Scorching":temp>=32?"Hot":temp>=26?"Warm":temp>=18?"Moderate":"Cool";
          setWeather({temp,condition,bonus});
          toast("Weather updated",`${temp}°C — ${condition}. Goal adjusted by ${bonus>=0?"+":""}${bonus} ml.`,"success",4000);
        }catch(e){ toast("Weather fetch failed","Could not reach weather API. Check your connection.","danger"); }
        setWeatherLoading(false);
      },
      (err)=>{
        setWeatherLoading(false);
        if(err.code===1) toast("Location denied","Allow location access in your browser settings to enable weather adjustment.","warning",7000);
        else toast("Location unavailable","Could not get your location. Try again.","warning");
      },
      {timeout:10000,enableHighAccuracy:false}
    );
  },[toast]);

  useEffect(()=>{ if(screen==="main") fetchWeather(); },[screen]);

  // ── persist ──
  const setApp = useCallback(upd=>{
    setAppRaw(prev=>{ const next=typeof upd==="function"?upd(prev):upd; persist(next); return next; });
  },[]);

  // ── Reminder — fires toast + push notification when timer expires ──
  const scheduleReminder = useCallback((mins)=>{
    if(timerRef.current) clearTimeout(timerRef.current);
    const ms = (mins||120)*60*1000;
    setNextReminder(Date.now()+ms);
    timerRef.current = setTimeout(()=>{
      // In-app toast
      toast("Time to hydrate","Your scheduled reminder interval has passed. Log your next drink.","info",12000);
      // OS push notification
      nSend("HydraMind — Hydration reminder","Your scheduled interval has passed. Log your next drink.");
    }, ms);
  },[toast]);

  useEffect(()=>{ if(screen==="main"&&app) scheduleReminder((app.settings && app.settings.reminderFreqMins)||120); return()=>{ if(timerRef.current) clearTimeout(timerRef.current); }; },[screen]);

  // ── Add water — fixes first_drop triggering, XP, all badges ──
  const addWater = useCallback((bev,rawMl,effMl)=>{
    const today=todayKey();
    setApp(prev=>{
      if(!prev) return prev;
      const wb=(weather && weather.bonus)||0, goal=computeGoal(prev.userData,wb);
      const log=(prev.dailyLogs && prev.dailyLogs[today])||{rawIntake:0,effIntake:0,logs:[]};
      const isFirstEver = (prev.earnedBadges||[]).length===0 && (log.logs||[]).length===0;
      const newEff=Math.min((log.effIntake||0)+effMl, goal+2500);
      const newLogs=[...(log.logs||[]),{time:Date.now(),rawMl,effMl,beverageId:bev.id}];

      const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yKey=yesterday.toISOString().slice(0,10);
      let streak={...(prev.streak||{current:0,best:0,lastDate:null})};
      if(newEff>=goal && streak.lastDate!==today){
        const hadY=((prev.dailyLogs && prev.dailyLogs[yKey] && prev.dailyLogs[yKey].effIntake)||0)>=computeGoal(prev.userData,0);
        const cur=hadY?streak.current+1:1;
        streak={current:cur, best:Math.max(cur,streak.best||0), lastDate:today};
        if(!goalMetRef.current){
          goalMetRef.current=true;
          setTimeout(()=>toast("Daily target reached",`${goal.toLocaleString()} ml logged. Well done.`,"success"),200);
          nSend("HydraMind — Target reached",`${goal.toLocaleString()} ml intake recorded for today.`);
          if((prev.settings && prev.settings.sounds)!==false) setTimeout(playGoal,300);
        }
      }

      let xp=prev.xp||0;
      xp = Math.min(xp+5, 9999); // +5 XP per drink
      const badges=[...(prev.earnedBadges||[])];
      const award=(id,xpBonus=0)=>{ if(!badges.includes(id)){ badges.push(id); xp=Math.min(xp+xpBonus,9999); setTimeout(()=>toast("Achievement unlocked",`You earned: ${id.replace(/_/g," ")}`,"success",4000),600); } };

      if(isFirstEver || newLogs.length===1) award("first_drop",10);
      if(newEff>=goal) award("goal_hit",50);
      if(streak.current>=3)  award("streak_3",30);
      if(streak.current>=7)  award("streak_7",60);
      if(streak.current>=30) award("streak_30",150);
      if(xp>=500) award("master",0);

      return{...prev, dailyLogs:{...prev.dailyLogs,[today]:{rawIntake:(log.rawIntake||0)+rawMl,effIntake:newEff,logs:newLogs}}, streak, xp, earnedBadges:badges};
    });
    if((app && app.settings && app.settings.sounds)!==false) playLog();
    if(app) scheduleReminder((app.settings && app.settings.reminderFreqMins)||120);
    goalMetRef.current=false;
  },[app,setApp,scheduleReminder,weather,toast]);

  // ── Undo ──
  const undoLast = useCallback(()=>{
    const today=todayKey();
    setApp(prev=>{
      if(!prev) return prev;
      const log=(prev.dailyLogs && prev.dailyLogs[today]);
      if(!(log && log.logs && log.logs.length)) return prev;
      const logs=[...log.logs], removed=logs.pop();
      return{...prev, dailyLogs:{...prev.dailyLogs,[today]:{...log,logs,effIntake:Math.max((log.effIntake||0)-(removed.effMl||0),0),rawIntake:Math.max((log.rawIntake||0)-(removed.rawMl||0),0)}}};
    });
    if((app && app.settings && app.settings.sounds)!==false) playUndo();
  },[app,setApp]);

  // ── Reset all data ──
  const resetAllData = useCallback(()=>{
    const fresh = defaultState();
    try { localStorage.clear(); } catch(e){}
    persist(fresh);
    setAppRaw(fresh);
    setScreen("onboarding");
    setTab("home");
    setWeather(null);
    goalMetRef.current=false;
    toast("Data reset","All data has been cleared. Starting fresh.","info",4000);
  },[toast]);

  // ── PWA install ──
  const triggerInstall = useCallback(async()=>{
    if(deferredPWA.current){
      deferredPWA.current.prompt();
      const { outcome } = await deferredPWA.current.userChoice;
      if(outcome==="accepted") toast("Installing","HydraMind is being added to your home screen.","success");
      deferredPWA.current=null;
    } else {
      setShowInstall(true); // fallback: show manual instructions
    }
  },[toast]);

  useEffect(()=>{ const now=new Date(); const t=setTimeout(()=>{goalMetRef.current=false;},new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now); return()=>clearTimeout(t); },[]);

  // ── status toasts — hooks must stay above any early return ──
  const statusRef = useRef(null);
  const wb    = app ? (weather && weather.bonus) || 0 : 0;
  const goal  = app ? computeGoal(app.userData, wb) : 2000;
  const today = todayKey();
  const todayLog = (app && app.dailyLogs && app.dailyLogs[today]) || {rawIntake:0,effIntake:0,logs:[]};
  const hourlyMl = todayLog.logs ? todayLog.logs.filter(l=>l.time>Date.now()-3600000).reduce((s,l)=>s+(l.effMl||0),0) : 0;
  const status   = app ? getStatus(todayLog.effIntake||0, goal, hourlyMl) : null;
  const lastLog  = (todayLog.logs && todayLog.logs.length) > 0 ? todayLog.logs[todayLog.logs.length-1] : null;
  const isOver   = (todayLog.effIntake||0) > goal+800;
  useEffect(()=>{
    if (!status) { statusRef.current=null; return; }
    if (status.level !== statusRef.current) {
      statusRef.current = status.level;
      if (status.level==="danger"||status.level==="warning") toast(status.title, status.msg, status.level, 10000);
    }
  },[status && status.level]);

  if (!app) return React.createElement('div', { style: { height:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" },}, React.createElement('div', { style: { color:T.boneDim, fontSize:12, letterSpacing:"0.12em", textTransform:"uppercase" },}, "Loading"));

  const renderTab = () => {
    switch(tab) {
      case "home":     return React.createElement(Home, { todayLog: todayLog, goal: goal, onAdd: addWater, onUndo: undoLast, onReminder: ()=>{ nReq(); scheduleReminder(15); toast("Reminder set","You will be notified in 15 minutes.","info"); }, ud: app.userData, nextReminder: nextReminder, weather: weather, weatherLoading: weatherLoading, onWeatherRefresh: fetchWeather,});
      case "insights": return React.createElement(Insights, { dailyLogs: app.dailyLogs, goal: goal, ud: app.userData,});
      case "report":   return React.createElement(Report, { dailyLogs: app.dailyLogs, goal: goal,});
      case "streak":   return React.createElement(StreakScreen, { streak: app.streak||{current:0,best:0}, xp: app.xp||0, earnedBadges: app.earnedBadges||[],});
      case "settings": return React.createElement(Settings, { appState: app, setApp: setApp, weather: weather, weatherLoading: weatherLoading, onWeatherRefresh: fetchWeather, onInstall: triggerInstall, onReset: resetAllData,});
      default: return null;
    }
  };

  return (
    React.createElement(React.Fragment, null
      , React.createElement('style', null, CSS)
      , React.createElement('div', { style: { width:"100vw", height:"100vh", background:T.bg, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" },}
        , screen === "splash" && React.createElement(Splash, { onDone: ()=>setScreen(app.onboarded?"main":"onboarding"),})
        , screen === "onboarding" && React.createElement(Onboarding, {
          onComplete: (finalData)=>{
            setApp(p=>({...p, userData:{...p.userData,...finalData}, onboarded:true}));
            setScreen("goal");
          },
          initialData: app.userData,}
        )
        , screen === "goal" && React.createElement(GoalScreen, { onStart: ()=>{setScreen("main");setTab("home");}, ud: app.userData, wb: wb,})
        , screen === "main" && (
          React.createElement('div', { style: { flex:1, display:"flex", flexDirection:"column", overflow:"hidden" },}
            , React.createElement(UndoStrip, { lastLog: lastLog, onUndo: undoLast,})
            , React.createElement('div', { style: { flex:1, overflow:"hidden" },}, renderTab())
            , React.createElement(Nav, { active: tab, navigate: setTab,})
          )
        )
        , React.createElement(Toast, { toasts: toasts, onDismiss: id=>setToasts(p=>p.filter(t=>t.id!==id)),})
        , showInstall && React.createElement(InstallModal, { onClose: ()=>setShowInstall(false),})
      )
    )
  );
}
    try {
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    } catch(e) {
      document.getElementById('err').style.display='block';
      document.getElementById('err').textContent='RENDER ERROR:\n'+e.toString()+'\n'+e.stack;
    }
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',function(){
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
